<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITAMD CASINO - с синхронизацией</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .auth-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .auth-card {
            background: rgba(30,30,40,0.95);
            border-radius: 24px;
            padding: 20px;
            width: 280px;
            border: 1px solid #f7931a;
        }
        .auth-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
        }
        .auth-card button {
            width: 100%;
            background: #f7931a;
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .admin-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #f7931a;
        }
        .admin-panel input {
            background: #2a2a2a;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            margin: 5px;
        }
        .balance-card {
            background: linear-gradient(135deg, #f7931a, #ffb347);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-card .balance { font-size: 48px; font-weight: bold; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: rgba(30,30,40,0.9);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(247,147,26,0.3);
        }
        button, select, input {
            background: #2a2a2a;
            border: 1px solid #f7931a;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
        }
        button { background: #f7931a; color: black; font-weight: bold; }
        .result { margin-top: 12px; padding: 8px; border-radius: 16px; background: rgba(0,0,0,0.5); font-size: 14px; }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        .logout-btn { background: #555; margin-top: 10px; }
        .loading { text-align: center; padding: 50px; font-size: 20px; }
        @media (max-width: 700px) {
            .auth-container { flex-direction: column; align-items: center; }
            .balance-card .balance { font-size: 36px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loadingOverlay" class="loading">⏳ Загрузка...</div>

    <div id="authPanel" style="display:none;">
        <div class="auth-container">
            <div class="auth-card">
                <h3>🔐 ВХОД</h3>
                <input type="text" id="loginUsername" placeholder="Логин">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLogin">Войти</button>
            </div>
            <div class="auth-card">
                <h3>📝 РЕГИСТРАЦИЯ</h3>
                <input type="text" id="regUsername" placeholder="Логин">
                <input type="password" id="regPassword" placeholder="Пароль">
                <button id="doRegister">Зарегистрироваться</button>
            </div>
        </div>
        <div id="authMessage" style="text-align:center; color:#f7931a;"></div>
    </div>

    <div id="gamePanel" style="display:none;">
        <div class="balance-card">
            <h2>💰 ИГРОК: <span id="currentUser">-</span></h2>
            <div class="balance" id="casinoBalance">0</div>
            <div>BITAMD</div>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>🔧 АДМИН-ПАНЕЛЬ</h3>
            <input type="text" id="adminTargetUser" placeholder="Логин игрока">
            <input type="number" id="adminNewBalance" placeholder="Новый баланс">
            <button id="adminSetBalance">Установить баланс</button>
            <button id="adminAddBalance">➕ Добавить</button>
            <button id="adminSubtractBalance">➖ Отнять</button>
            <div id="adminMsg"></div>
        </div>

        <div class="games-grid">
            <div class="game-card">
                <h3>🪙 ОРЁЛ / РЕШКА</h3>
                <select id="coinBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option><option value="25">25 AMD</option><option value="50">50 AMD</option></select>
                <div><button id="coinHeads">ОРЁЛ</button> <button id="coinTails">РЕШКА</button></div>
                <div id="coinResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎲 КУБИК (x5)</h3>
                <select id="diceBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option><option value="25">25 AMD</option></select>
                <input type="number" id="diceGuess" min="1" max="6" placeholder="Число 1-6" style="width:80px">
                <button id="diceBtn">КРУТИТЬ</button>
                <div id="diceResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎡 РУЛЕТКА 1-10 (x10)</h3>
                <select id="rouletteBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option></select>
                <input type="number" id="rouletteGuess" min="1" max="10" placeholder="1-10" style="width:80px">
                <button id="rouletteBtn">КРУТИТЬ</button>
                <div id="rouletteResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎰 СЛОТЫ (x7)</h3>
                <select id="slotsBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option></select>
                <button id="slotsBtn">КРУТИТЬ</button>
                <div id="slotsDisplay" style="font-size:28px; letter-spacing:8px; margin:10px 0;">🍒 🍒 🍒</div>
                <div id="slotsResult" class="result"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ GitHub (токен уже вставлен) ==========
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'abdullaevamet6-glitch';
    const REPO_NAME = 'bitamd-casino';          // <--- ПРОВЕРЬ ИМЯ РЕПОЗИТОРИЯ
    const FILE_PATH = 'users.json';
    const BRANCH = 'main';

    let currentUser = null;
    let usersCache = null;

    async function fetchUsersFile() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const res = await fetch(url, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const content = atob(data.content);
        return { users: JSON.parse(content), sha: data.sha };
    }

    async function saveUsersFile(users, sha) {
        const content = btoa(JSON.stringify(users, null, 2));
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'update users', content, sha, branch: BRANCH })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }

    async function loadUsers() {
        try {
            const { users, sha } = await fetchUsersFile();
            usersCache = { users, sha };
            return users;
        } catch (e) {
            console.error('Ошибка загрузки:', e);
            return null;
        }
    }

    async function refreshGameUI() {
        if (!currentUser) return;
        const users = await loadUsers();
        if (users && users[currentUser]) {
            document.getElementById('casinoBalance').innerText = users[currentUser].balance.toFixed(2);
        }
    }

    async function login(username, password) {
        const users = await loadUsers();
        if (!users) { showMessage('authMessage', '❌ Ошибка загрузки данных', true); return false; }
        if (!users[username] || users[username].password !== password) {
            showMessage('authMessage', '❌ Неверный логин или пароль', true);
            return false;
        }
        currentUser = username;
        updateUI();
        return true;
    }

    async function register(username, password) {
        try {
            const { users, sha } = await fetchUsersFile();
            if (users[username]) {
                showMessage('authMessage', '❌ Логин уже занят', true);
                return false;
            }
            users[username] = { password, balance: 100, isAdmin: false };
            await saveUsersFile(users, sha);
            showMessage('authMessage', '✅ Регистрация успешна! Теперь войдите.', false);
            return true;
        } catch (e) {
            showMessage('authMessage', '❌ Ошибка регистрации', true);
            return false;
        }
    }

    async function setUserBalance(username, newBalance) {
        try {
            const { users, sha } = await fetchUsersFile();
            if (!users[username]) { showMessage('adminMsg', '❌ Игрок не найден', true); return false; }
            if (newBalance < 0) newBalance = 0;
            users[username].balance = newBalance;
            await saveUsersFile(users, sha);
            if (currentUser === username) await refreshGameUI();
            showMessage('adminMsg', `✅ ${username} → ${newBalance} AMD`, false);
            return true;
        } catch (e) {
            showMessage('adminMsg', '❌ Ошибка', true);
            return false;
        }
    }

    async function addToBalance(username, amount) {
        try {
            const { users, sha } = await fetchUsersFile();
            if (!users[username]) { showMessage('adminMsg', '❌ Игрок не найден', true); return false; }
            let newBal = users[username].balance + amount;
            if (newBal < 0) newBal = 0;
            users[username].balance = newBal;
            await saveUsersFile(users, sha);
            if (currentUser === username) await refreshGameUI();
            showMessage('adminMsg', `✅ ${amount > 0 ? '+' : ''}${amount} AMD для ${username}`, false);
            return true;
        } catch (e) {
            showMessage('adminMsg', '❌ Ошибка', true);
            return false;
        }
    }

    async function playGame(gameName, bet, targetValue, resultDivId) {
        if (!currentUser) { alert("Вы не авторизованы!"); return; }
        try {
            const { users, sha } = await fetchUsersFile();
            const user = users[currentUser];
            if (!user) { alert("Ошибка: пользователь не найден"); return; }
            if (user.balance < bet) { alert("❌ Недостаточно средств!"); return; }

            let isWin = false;
            let winAmount = 0;
            let displayMsg = "";

            if (gameName === 'coin') {
                const result = Math.random() < 0.5 ? 'Орёл' : 'Решка';
                isWin = result === targetValue;
                winAmount = isWin ? bet * 2 : 0;
                displayMsg = result;
            } else if (gameName === 'dice') {
                const roll = Math.floor(Math.random() * 6) + 1;
                isWin = roll === parseInt(targetValue);
                winAmount = isWin ? bet * 5 : 0;
                displayMsg = `Выпало ${roll}`;
            } else if (gameName === 'roulette') {
                const roll = Math.floor(Math.random() * 10) + 1;
                isWin = roll === parseInt(targetValue);
                winAmount = isWin ? bet * 10 : 0;
                displayMsg = `Выпало ${roll}`;
            } else if (gameName === 'slots') {
                const symbols = ['🍒','🍋','🍊','🍉','⭐','💎','7️⃣'];
                const a = symbols[Math.floor(Math.random()*symbols.length)];
                const b = symbols[Math.floor(Math.random()*symbols.length)];
                const c = symbols[Math.floor(Math.random()*symbols.length)];
                document.getElementById('slotsDisplay').innerHTML = `${a} ${b} ${c}`;
                isWin = (a === b && b === c);
                winAmount = isWin ? bet * 7 : 0;
                displayMsg = `${a} ${b} ${c}`;
            }

            user.balance -= bet;
            if (isWin) user.balance += winAmount;
            await saveUsersFile(users, sha);
            await refreshGameUI();

            const resultDiv = document.getElementById(resultDivId);
            if (isWin) {
                resultDiv.innerHTML = `🎉 Выигрыш ${winAmount} AMD! ${displayMsg}`;
                resultDiv.className = 'result win';
            } else {
                resultDiv.innerHTML = `😞 Проигрыш ${bet} AMD. ${displayMsg}`;
                resultDiv.className = 'result lose';
            }
            setTimeout(() => resultDiv.className = 'result', 2000);
        } catch (e) {
            alert("Ошибка при игре. Попробуй ещё раз.");
        }
    }

    function showMessage(elId, msg, isError) {
        const el = document.getElementById(elId);
        if (el) {
            el.innerHTML = msg;
            setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
        }
    }

    async function updateUI() {
        if (!currentUser) {
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('gamePanel').style.display = 'none';
            document.getElementById('loadingOverlay').style.display = 'none';
            return;
        }
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        document.getElementById('currentUser').innerText = currentUser;
        const users = await loadUsers();
        if (users && users[currentUser]) {
            document.getElementById('casinoBalance').innerText = users[currentUser].balance.toFixed(2);
            const isAdmin = users[currentUser].isAdmin === true;
            document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
        }
    }

    // --- Обработчики ---
    document.getElementById('doLogin').onclick = async () => {
        const login = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        if (!login || !pass) { showMessage('authMessage', 'Заполни поля', true); return; }
        document.getElementById('loadingOverlay').style.display = 'block';
        await login(login, pass);
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    };
    document.getElementById('doRegister').onclick = async () => {
        const login = document.getElementById('regUsername').value.trim();
        const pass = document.getElementById('regPassword').value.trim();
        if (!login || !pass) { showMessage('authMessage', 'Заполни поля', true); return; }
        document.getElementById('loadingOverlay').style.display = 'block';
        await register(login, pass);
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
    };
    document.getElementById('logoutBtn').onclick = () => { currentUser = null; updateUI(); };

    document.getElementById('adminSetBalance').onclick = async () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const newBal = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(newBal)) { showMessage('adminMsg', 'Введи логин и баланс', true); return; }
        await setUserBalance(target, newBal);
    };
    document.getElementById('adminAddBalance').onclick = async () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const add = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(add)) { showMessage('adminMsg', 'Введи логин и сумму', true); return; }
        await addToBalance(target, add);
    };
    document.getElementById('adminSubtractBalance').onclick = async () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const sub = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(sub)) { showMessage('adminMsg', 'Введи логин и сумму', true); return; }
        await addToBalance(target, -sub);
    };

    document.getElementById('coinHeads').onclick = () => playGame('coin', parseFloat(document.getElementById('coinBet').value), 'Орёл', 'coinResult');
    document.getElementById('coinTails').onclick = () => playGame('coin', parseFloat(document.getElementById('coinBet').value), 'Решка', 'coinResult');
    document.getElementById('diceBtn').onclick = () => {
        const guess = document.getElementById('diceGuess').value;
        if (!guess || guess<1 || guess>6) { alert("Число 1-6"); return; }
        playGame('dice', parseFloat(document.getElementById('diceBet').value), guess, 'diceResult');
        document.getElementById('diceGuess').value = '';
    };
    document.getElementById('rouletteBtn').onclick = () => {
        const guess = document.getElementById('rouletteGuess').value;
        if (!guess || guess<1 || guess>10) { alert("Число 1-10"); return; }
        playGame('roulette', parseFloat(document.getElementById('rouletteBet').value), guess, 'rouletteResult');
        document.getElementById('rouletteGuess').value = '';
    };
    document.getElementById('slotsBtn').onclick = () => playGame('slots', parseFloat(document.getElementById('slotsBet').value), null, 'slotsResult');

    (async () => {
        document.getElementById('loadingOverlay').style.display = 'block';
        await loadUsers();
        updateUI();
    })();
</script>
</body>
</html>
