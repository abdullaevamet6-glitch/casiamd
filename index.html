<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITAMD CASINO</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .auth-card {
            background: rgba(30,30,40,0.95);
            border-radius: 24px;
            padding: 20px;
            width: 280px;
            margin: 0 auto 20px;
            border: 1px solid #f7931a;
        }
        .auth-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
        }
        .auth-card button {
            width: 100%;
            background: #f7931a;
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .admin-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #f7931a;
        }
        .admin-panel input {
            background: #2a2a2a;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            margin: 5px;
        }
        .balance-card {
            background: linear-gradient(135deg, #f7931a, #ffb347);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-card .balance { font-size: 48px; font-weight: bold; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: rgba(30,30,40,0.9);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(247,147,26,0.3);
        }
        button, select, input {
            background: #2a2a2a;
            border: 1px solid #f7931a;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
        }
        button { background: #f7931a; color: black; font-weight: bold; }
        .result { margin-top: 12px; padding: 8px; border-radius: 16px; background: rgba(0,0,0,0.5); font-size: 14px; }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        .logout-btn { background: #555; margin-top: 10px; }
        .create-user-btn { background: #2c7a4d; margin-left: 10px; }
        @media (max-width: 700px) {
            .balance-card .balance { font-size: 36px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="authPanel">
        <div class="auth-card">
            <h3>🔐 ВХОД</h3>
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLoginBtn">Войти</button>
        </div>
        <div id="authMessage" style="text-align:center; color:#f7931a;"></div>
    </div>

    <div id="gamePanel" style="display:none;">
        <div class="balance-card">
            <h2>💰 ИГРОК: <span id="currentUser">-</span></h2>
            <div class="balance" id="casinoBalance">0</div>
            <div>BITAMD</div>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>🔧 АДМИН-ПАНЕЛЬ</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <input type="text" id="adminTargetUser" placeholder="Логин игрока" style="flex:2;">
                <input type="number" id="adminNewBalance" placeholder="Новый баланс" style="flex:1;">
                <button id="adminSetBalance">Установить</button>
                <button id="adminAddBalance">➕ Добавить</button>
                <button id="adminSubtractBalance">➖ Отнять</button>
                <button id="adminCreateUserBtn" class="create-user-btn">➕ Создать игрока</button>
            </div>
            <div id="adminMsg" style="margin-top: 10px;"></div>
        </div>

        <div class="games-grid">
            <div class="game-card">
                <h3>🪙 ОРЁЛ / РЕШКА</h3>
                <select id="coinBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option><option value="25">25 AMD</option><option value="50">50 AMD</option></select>
                <div><button id="coinHeads">ОРЁЛ</button> <button id="coinTails">РЕШКА</button></div>
                <div id="coinResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎲 КУБИК (x5)</h3>
                <select id="diceBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option><option value="25">25 AMD</option></select>
                <input type="number" id="diceGuess" min="1" max="6" placeholder="Число 1-6" style="width:80px">
                <button id="diceBtn">КРУТИТЬ</button>
                <div id="diceResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎡 РУЛЕТКА 1-10 (x10)</h3>
                <select id="rouletteBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option></select>
                <input type="number" id="rouletteGuess" min="1" max="10" placeholder="1-10" style="width:80px">
                <button id="rouletteBtn">КРУТИТЬ</button>
                <div id="rouletteResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎰 СЛОТЫ (x7)</h3>
                <select id="slotsBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option></select>
                <button id="slotsBtn">КРУТИТЬ</button>
                <div id="slotsDisplay" style="font-size:28px; letter-spacing:8px; margin:10px 0;">🍒 🍒 🍒</div>
                <div id="slotsResult" class="result"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== НАСТРОЙКИ JsonBox =====
    const API_KEY = 'd13e1fc29bf7add8378b8e5c6f907546';
    const API_KEY_READ_ONLY = 'ro_17864cdc7b28387b717902b91d4b3f86';
    const STORE_URL = 'https://jsonbox.ru/api.php?action=store';
    const GET_URL = 'https://jsonbox.ru/api.php?action=get';

    let currentUser = null;

    async function loadUsersFromJsonBox() {
        try {
            const response = await fetch(`${GET_URL}&api_key=${API_KEY_READ_ONLY}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success && data.data) {
                return JSON.parse(data.data);
            } else {
                // Если данных нет, создаём начальный файл
                const defaultUsers = {
                    admin: { password: 'admin123', balance: 10000, isAdmin: true },
                    Morpex: { password: '97531', balance: 1000, isAdmin: false }
                };
                await saveUsersToJsonBox(defaultUsers);
                return defaultUsers;
            }
        } catch (e) {
            console.error('Ошибка загрузки:', e);
            document.getElementById('authMessage').innerHTML = '❌ Ошибка загрузки данных';
            return null;
        }
    }

    async function saveUsersToJsonBox(users) {
        const response = await fetch(STORE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: API_KEY, data: JSON.stringify(users) })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    async function refreshGameUI() {
        if (!currentUser) {
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('gamePanel').style.display = 'none';
            return;
        }
        const users = await loadUsersFromJsonBox();
        if (!users) return;
        const user = users[currentUser];
        if (!user) return;
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        document.getElementById('currentUser').innerText = currentUser;
        document.getElementById('casinoBalance').innerText = user.balance.toFixed(2);
        const isAdmin = user.isAdmin === true;
        document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
    }

    async function performLogin(username, password) {
        const users = await loadUsersFromJsonBox();
        if (!users) return false;
        const user = users[username];
        if (!user || user.password !== password) {
            document.getElementById('authMessage').innerHTML = '❌ Неверный логин или пароль';
            return false;
        }
        currentUser = username;
        await refreshGameUI();
        return true;
    }

    async function updateUserBalance(username, newBalance) {
        const users = await loadUsersFromJsonBox();
        if (!users || !users[username]) return false;
        if (newBalance < 0) newBalance = 0;
        users[username].balance = newBalance;
        await saveUsersToJsonBox(users);
        if (currentUser === username) {
            document.getElementById('casinoBalance').innerText = newBalance.toFixed(2);
        }
        return true;
    }

    async function addUserBalance(username, amount) {
        const users = await loadUsersFromJsonBox();
        if (!users || !users[username]) return false;
        let newBalance = users[username].balance + amount;
        if (newBalance < 0) newBalance = 0;
        users[username].balance = newBalance;
        await saveUsersToJsonBox(users);
        if (currentUser === username) {
            document.getElementById('casinoBalance').innerText = newBalance.toFixed(2);
        }
        return true;
    }

    async function createNewUser(username, password, balance = 100, isAdmin = false) {
        const users = await loadUsersFromJsonBox();
        if (!users || users[username]) return false;
        users[username] = { password, balance, isAdmin };
        await saveUsersToJsonBox(users);
        return true;
    }

    function showAdminMessage(msg) {
        const el = document.getElementById('adminMsg');
        if (el) {
            el.innerHTML = msg;
            setTimeout(() => { el.innerHTML = ''; }, 3000);
        }
    }

    async function playGame(gameType, bet, guess, resultElement) {
        if (!currentUser) { alert("Вы не авторизованы!"); return; }
        const users = await loadUsersFromJsonBox();
        const user = users?.[currentUser];
        if (!user) { alert("Ошибка пользователя"); return; }
        if (user.balance < bet) { alert("❌ Недостаточно средств!"); return; }

        let isWin = false;
        let winAmount = 0;
        let displayMessage = "";

        if (gameType === 'coin') {
            const result = Math.random() < 0.5 ? 'Орёл' : 'Решка';
            isWin = result === guess;
            winAmount = isWin ? bet * 2 : 0;
            displayMessage = result;
        } else if (gameType === 'dice') {
            const roll = Math.floor(Math.random() * 6) + 1;
            isWin = roll === guess;
            winAmount = isWin ? bet * 5 : 0;
            displayMessage = `Выпало ${roll}`;
        } else if (gameType === 'roulette') {
            const roll = Math.floor(Math.random() * 10) + 1;
            isWin = roll === guess;
            winAmount = isWin ? bet * 10 : 0;
            displayMessage = `Выпало ${roll}`;
        } else if (gameType === 'slots') {
            const symbols = ['🍒','🍋','🍊','🍉','⭐','💎','7️⃣'];
            const a = symbols[Math.floor(Math.random()*symbols.length)];
            const b = symbols[Math.floor(Math.random()*symbols.length)];
            const c = symbols[Math.floor(Math.random()*symbols.length)];
            document.getElementById('slotsDisplay').innerHTML = `${a} ${b} ${c}`;
            isWin = (a === b && b === c);
            winAmount = isWin ? bet * 7 : 0;
            displayMessage = `${a} ${b} ${c}`;
        }

        user.balance -= bet;
        if (isWin) user.balance += winAmount;
        await saveUsersToJsonBox(users);
        document.getElementById('casinoBalance').innerText = user.balance.toFixed(2);

        if (isWin) {
            resultElement.innerHTML = `🎉 Выигрыш ${winAmount} AMD! ${displayMessage}`;
            resultElement.className = 'result win';
        } else {
            resultElement.innerHTML = `😞 Проигрыш ${bet} AMD. ${displayMessage}`;
            resultElement.className = 'result lose';
        }
        setTimeout(() => resultElement.className = 'result', 2000);
    }

    // --- Обработчики ---
    document.getElementById('doLoginBtn').onclick = async () => {
        const login = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        if (!login || !pass) { document.getElementById('authMessage').innerHTML = 'Заполните поля'; return; }
        await performLogin(login, pass);
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    };

    document.getElementById('logoutBtn').onclick = () => {
        currentUser = null;
        refreshGameUI();
    };

    document.getElementById('adminSetBalance').onclick = async () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const newBalance = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(newBalance)) { showAdminMessage('Введите логин и баланс'); return; }
        if (await updateUserBalance(target, newBalance)) {
            showAdminMessage(`✅ ${target} → ${newBalance} AMD`);
        } else {
            showAdminMessage('❌ Игрок не найден');
        }
    };

    document.getElementById('adminAddBalance').onclick = async () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const amount = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(amount)) { showAdminMessage('Введите логин и сумму'); return; }
        if (await addUserBalance(target, amount)) {
            showAdminMessage(`✅ +${amount} AMD для ${target}`);
        } else {
            showAdminMessage('❌ Игрок не найден');
        }
    };

    document.getElementById('adminSubtractBalance').onclick = async () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const amount = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(amount)) { showAdminMessage('Введите логин и сумму'); return; }
        if (await addUserBalance(target, -amount)) {
            showAdminMessage(`✅ -${amount} AMD для ${target}`);
        } else {
            showAdminMessage('❌ Игрок не найден');
        }
    };

    document.getElementById('adminCreateUserBtn').onclick = async () => {
        const newLogin = prompt("Логин нового игрока:");
        if (!newLogin) return;
        const users = await loadUsersFromJsonBox();
        if (users?.[newLogin]) { showAdminMessage('❌ Логин уже существует'); return; }
        const newPass = prompt("Пароль:");
        if (!newPass) return;
        await createNewUser(newLogin, newPass, 100, false);
        showAdminMessage(`✅ Игрок ${newLogin} создан!`);
    };

    document.getElementById('coinHeads').onclick = () => playGame('coin', parseFloat(document.getElementById('coinBet').value), 'Орёл', document.getElementById('coinResult'));
    document.getElementById('coinTails').onclick = () => playGame('coin', parseFloat(document.getElementById('coinBet').value), 'Решка', document.getElementById('coinResult'));
    document.getElementById('diceBtn').onclick = () => {
        const guess = parseInt(document.getElementById('diceGuess').value);
        if (isNaN(guess) || guess < 1 || guess > 6) { alert("Число от 1 до 6"); return; }
        playGame('dice', parseFloat(document.getElementById('diceBet').value), guess, document.getElementById('diceResult'));
        document.getElementById('diceGuess').value = '';
    };
    document.getElementById('rouletteBtn').onclick = () => {
        const guess = parseInt(document.getElementById('rouletteGuess').value);
        if (isNaN(guess) || guess < 1 || guess > 10) { alert("Число от 1 до 10"); return; }
        playGame('roulette', parseFloat(document.getElementById('rouletteBet').value), guess, document.getElementById('rouletteResult'));
        document.getElementById('rouletteGuess').value = '';
    };
    document.getElementById('slotsBtn').onclick = () => playGame('slots', parseFloat(document.getElementById('slotsBet').value), null, document.getElementById('slotsResult'));

    refreshGameUI();
</script>
</body>
</html>
