<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITAMD CASINO - админ создаёт игроков</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .auth-card {
            background: rgba(30,30,40,0.95);
            border-radius: 24px;
            padding: 20px;
            width: 280px;
            margin: 0 auto 20px;
            border: 1px solid #f7931a;
        }
        .auth-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
        }
        .auth-card button {
            width: 100%;
            background: #f7931a;
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .admin-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #f7931a;
        }
        .admin-panel input {
            background: #2a2a2a;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            margin: 5px;
        }
        .balance-card {
            background: linear-gradient(135deg, #f7931a, #ffb347);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-card .balance { font-size: 48px; font-weight: bold; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: rgba(30,30,40,0.9);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(247,147,26,0.3);
        }
        button, select, input {
            background: #2a2a2a;
            border: 1px solid #f7931a;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
        }
        button { background: #f7931a; color: black; font-weight: bold; }
        .result { margin-top: 12px; padding: 8px; border-radius: 16px; background: rgba(0,0,0,0.5); font-size: 14px; }
        .win { color: #4caf50; }
        .lose { color: #f44336; }
        .logout-btn { background: #555; margin-top: 10px; }
        .create-user-btn { background: #2c7a4d; margin-left: 10px; }
        @media (max-width: 700px) {
            .balance-card .balance { font-size: 36px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Панель входа -->
    <div id="authPanel">
        <div class="auth-card">
            <h3>🔐 ВХОД</h3>
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLogin">Войти</button>
        </div>
        <div id="authMessage" style="text-align:center; color:#f7931a;"></div>
    </div>

    <!-- Игровая панель (после входа) -->
    <div id="gamePanel" style="display:none;">
        <div class="balance-card">
            <h2>💰 ИГРОК: <span id="currentUser">-</span></h2>
            <div class="balance" id="casinoBalance">0</div>
            <div>BITAMD</div>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>

        <!-- Админ-панель (видна только админу) -->
        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>🔧 АДМИН-ПАНЕЛЬ</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <input type="text" id="adminTargetUser" placeholder="Логин игрока" style="flex:2;">
                <input type="number" id="adminNewBalance" placeholder="Новый баланс" style="flex:1;">
                <button id="adminSetBalance">Установить</button>
                <button id="adminAddBalance">➕ Добавить</button>
                <button id="adminSubtractBalance">➖ Отнять</button>
                <button id="adminCreateUser" class="create-user-btn">➕ Создать игрока</button>
            </div>
            <div id="adminMsg" style="margin-top: 10px;"></div>
        </div>

        <div class="games-grid">
            <div class="game-card">
                <h3>🪙 ОРЁЛ / РЕШКА</h3>
                <select id="coinBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option><option value="25">25 AMD</option><option value="50">50 AMD</option></select>
                <div><button id="coinHeads">ОРЁЛ</button> <button id="coinTails">РЕШКА</button></div>
                <div id="coinResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎲 КУБИК (x5)</h3>
                <select id="diceBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option><option value="25">25 AMD</option></select>
                <input type="number" id="diceGuess" min="1" max="6" placeholder="Число 1-6" style="width:80px">
                <button id="diceBtn">КРУТИТЬ</button>
                <div id="diceResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎡 РУЛЕТКА 1-10 (x10)</h3>
                <select id="rouletteBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option></select>
                <input type="number" id="rouletteGuess" min="1" max="10" placeholder="1-10" style="width:80px">
                <button id="rouletteBtn">КРУТИТЬ</button>
                <div id="rouletteResult" class="result"></div>
            </div>
            <div class="game-card">
                <h3>🎰 СЛОТЫ (x7)</h3>
                <select id="slotsBet"><option value="1">1 AMD</option><option value="2">2 AMD</option><option value="5">5 AMD</option><option value="10">10 AMD</option></select>
                <button id="slotsBtn">КРУТИТЬ</button>
                <div id="slotsDisplay" style="font-size:28px; letter-spacing:8px; margin:10px 0;">🍒 🍒 🍒</div>
                <div id="slotsResult" class="result"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== ЛОКАЛЬНОЕ ХРАНЕНИЕ =====
    let users = JSON.parse(localStorage.getItem('casino_users') || '{}');
    let currentUser = null;

    // Создаём админа, если его нет
    if (!users['admin']) {
        users['admin'] = { password: 'admin123', balance: 10000, isAdmin: true };
        localStorage.setItem('casino_users', JSON.stringify(users));
    }

    function saveUsers() {
        localStorage.setItem('casino_users', JSON.stringify(users));
    }

    function updateUI() {
        if (!currentUser) {
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('gamePanel').style.display = 'none';
            return;
        }
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        document.getElementById('currentUser').innerText = currentUser;
        const balance = users[currentUser]?.balance || 0;
        document.getElementById('casinoBalance').innerText = balance.toFixed(2);
        const isAdmin = users[currentUser]?.isAdmin === true;
        document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
    }

    function setUserBalance(username, newBalance) {
        if (!users[username]) return false;
        if (newBalance < 0) newBalance = 0;
        users[username].balance = newBalance;
        saveUsers();
        if (currentUser === username) {
            document.getElementById('casinoBalance').innerText = newBalance.toFixed(2);
        }
        return true;
    }

    function addToBalance(username, amount) {
        if (!users[username]) return false;
        let newBal = users[username].balance + amount;
        if (newBal < 0) newBal = 0;
        users[username].balance = newBal;
        saveUsers();
        if (currentUser === username) {
            document.getElementById('casinoBalance').innerText = newBal.toFixed(2);
        }
        return true;
    }

    function createUser(username, password, balance = 100) {
        if (users[username]) return false;
        users[username] = { password, balance, isAdmin: false };
        saveUsers();
        return true;
    }

    function showMessage(elId, msg, isError) {
        const el = document.getElementById(elId);
        if (el) {
            el.innerHTML = msg;
            setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
        }
    }

    function showResult(el, msg, isWin) {
        el.innerHTML = msg;
        el.className = `result ${isWin ? 'win' : 'lose'}`;
        setTimeout(() => el.className = 'result', 2000);
    }

    function playGame(gameName, bet, targetValue, resultDiv, onWinMsg, onLoseMsg) {
        if (!currentUser) { alert("Вы не авторизованы!"); return; }
        const user = users[currentUser];
        if (!user) { alert("Ошибка пользователя"); return; }
        if (user.balance < bet) { alert("❌ Недостаточно средств!"); return; }

        let isWin = false;
        let winAmount = 0;
        let displayMsg = "";

        if (gameName === 'coin') {
            const result = Math.random() < 0.5 ? 'Орёл' : 'Решка';
            isWin = result === targetValue;
            winAmount = isWin ? bet * 2 : 0;
            displayMsg = result;
        } else if (gameName === 'dice') {
            const roll = Math.floor(Math.random() * 6) + 1;
            isWin = roll === targetValue;
            winAmount = isWin ? bet * 5 : 0;
            displayMsg = `Выпало ${roll}`;
        } else if (gameName === 'roulette') {
            const roll = Math.floor(Math.random() * 10) + 1;
            isWin = roll === targetValue;
            winAmount = isWin ? bet * 10 : 0;
            displayMsg = `Выпало ${roll}`;
        } else if (gameName === 'slots') {
            const sym = ['🍒','🍋','🍊','🍉','⭐','💎','7️⃣'];
            const a = sym[Math.floor(Math.random()*sym.length)];
            const b = sym[Math.floor(Math.random()*sym.length)];
            const c = sym[Math.floor(Math.random()*sym.length)];
            document.getElementById('slotsDisplay').innerHTML = `${a} ${b} ${c}`;
            isWin = (a === b && b === c);
            winAmount = isWin ? bet * 7 : 0;
            displayMsg = `${a} ${b} ${c}`;
        }

        user.balance -= bet;
        if (isWin) user.balance += winAmount;
        saveUsers();
        document.getElementById('casinoBalance').innerText = user.balance.toFixed(2);

        if (isWin) {
            showResult(resultDiv, `🎉 Выигрыш ${winAmount} AMD! ${displayMsg}`, true);
        } else {
            showResult(resultDiv, `😞 Проигрыш ${bet} AMD. ${displayMsg}`, false);
        }
    }

    // --- Обработчики ---
    document.getElementById('doLogin').onclick = () => {
        const login = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        if (!login || !pass) { showMessage('authMessage', 'Заполни поля', true); return; }
        if (!users[login] || users[login].password !== pass) {
            showMessage('authMessage', '❌ Неверный логин или пароль', true);
            return;
        }
        currentUser = login;
        updateUI();
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    };
    document.getElementById('logoutBtn').onclick = () => { currentUser = null; updateUI(); };

    // Админ-панель
    document.getElementById('adminSetBalance').onclick = () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const newBal = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(newBal)) { showMessage('adminMsg', 'Введи логин и баланс', true); return; }
        if (setUserBalance(target, newBal)) showMessage('adminMsg', `✅ ${target} → ${newBal} AMD`, false);
        else showMessage('adminMsg', '❌ Игрок не найден', true);
    };
    document.getElementById('adminAddBalance').onclick = () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const add = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(add)) { showMessage('adminMsg', 'Введи логин и сумму', true); return; }
        if (addToBalance(target, add)) showMessage('adminMsg', `✅ +${add} AMD для ${target}`, false);
        else showMessage('adminMsg', '❌ Игрок не найден', true);
    };
    document.getElementById('adminSubtractBalance').onclick = () => {
        const target = document.getElementById('adminTargetUser').value.trim();
        const sub = parseFloat(document.getElementById('adminNewBalance').value);
        if (!target || isNaN(sub)) { showMessage('adminMsg', 'Введи логин и сумму', true); return; }
        if (addToBalance(target, -sub)) showMessage('adminMsg', `✅ -${sub} AMD для ${target}`, false);
        else showMessage('adminMsg', '❌ Игрок не найден', true);
    };
    document.getElementById('adminCreateUser').onclick = () => {
        const newLogin = prompt("Логин нового игрока:");
        if (!newLogin) return;
        if (users[newLogin]) {
            showMessage('adminMsg', '❌ Игрок с таким логином уже существует', true);
            return;
        }
        const newPass = prompt("Пароль для нового игрока:");
        if (!newPass) return;
        createUser(newLogin, newPass, 100);
        showMessage('adminMsg', `✅ Игрок ${newLogin} создан! Баланс 100 AMD.`, false);
    };

    // Игры
    document.getElementById('coinHeads').onclick = () => playGame('coin', parseFloat(document.getElementById('coinBet').value), 'Орёл', document.getElementById('coinResult'));
    document.getElementById('coinTails').onclick = () => playGame('coin', parseFloat(document.getElementById('coinBet').value), 'Решка', document.getElementById('coinResult'));
    document.getElementById('diceBtn').onclick = () => {
        const guess = parseInt(document.getElementById('diceGuess').value);
        if (isNaN(guess) || guess<1 || guess>6) { alert("Число 1-6"); return; }
        playGame('dice', parseFloat(document.getElementById('diceBet').value), guess, document.getElementById('diceResult'));
        document.getElementById('diceGuess').value = '';
    };
    document.getElementById('rouletteBtn').onclick = () => {
        const guess = parseInt(document.getElementById('rouletteGuess').value);
        if (isNaN(guess) || guess<1 || guess>10) { alert("Число 1-10"); return; }
        playGame('roulette', parseFloat(document.getElementById('rouletteBet').value), guess, document.getElementById('rouletteResult'));
        document.getElementById('rouletteGuess').value = '';
    };
    document.getElementById('slotsBtn').onclick = () => playGame('slots', parseFloat(document.getElementById('slotsBet').value), null, document.getElementById('slotsResult'));

    updateUI();
</script>
</body>
</html>
